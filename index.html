    <style>
        /* ========== RESET & BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Poppins', sans-serif;
            color: #222222;
            background: #FFFFFF;
            line-height: 1.6;
            overflow-x: hidden;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        ul {
            list-style: none;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        }

        /* ========== HEADER ========== */
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(75, 19, 104, 0.08);
            padding: 10px 0;
            transition: all 0.3s ease;
        }
        .header__inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.3rem;
            color: #4B1368;
            white-space: nowrap;
        }
        .logo__icon {
            font-size: 1.8rem;
        }
        .logo__text {
            font-size: 1.2rem;
        }
        .logo__text span {
            color: #6D28D9;
        }
        .logo__text .amp {
            color: #FFD54F;
            font-weight: 800;
        }
        .nav__list {
            display: flex;
            gap: 28px;
            align-items: center;
        }
        .nav__link {
            font-weight: 500;
            font-size: 0.95rem;
            color: #222;
            transition: color 0.3s;
            position: relative;
        }
        .nav__link:hover,
        .nav__link.active {
            color: #6D28D9;
        }
        .nav__link.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #6D28D9;
            border-radius: 2px;
        }
        .header__actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header__call {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #4B1368;
            color: #fff;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: background 0.3s;
        }
        .header__call:hover {
            background: #6D28D9;
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .hamburger span {
            width: 28px;
            height: 3px;
            background: #4B1368;
            border-radius: 4px;
            transition: 0.3s;
        }
        .nav__close {
            display: none;
            background: none;
            border: none;
            font-size: 2rem;
            color: #4B1368;
            cursor: pointer;
        }

        /* ========== HERO ========== */
        .hero {
            position: relative;
            padding: 80px 0 100px;
            background: linear-gradient(135deg, #f8f0ff 0%, #ede7f6 100%);
            overflow: hidden;
        }
        .hero__bg {
            position: absolute;
            top: -30%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(109, 40, 217, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .hero__inner {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 2;
        }
        .hero__badge {
            display: inline-block;
            background: rgba(75, 19, 104, 0.12);
            color: #4B1368;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        .hero__title {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1.15;
            color: #4B1368;
            margin-bottom: 16px;
        }
        .hero__sub {
            font-size: 1.15rem;
            color: #444;
            margin-bottom: 28px;
            max-width: 500px;
        }
        .hero__btns {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 40px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 34px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .btn--primary {
            background: linear-gradient(135deg, #4B1368, #6D28D9);
            color: #fff;
            box-shadow: 0 12px 30px rgba(75, 19, 104, 0.3);
        }
        .btn--primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 40px rgba(75, 19, 104, 0.4);
        }
        .btn--outline {
            background: transparent;
            color: #4B1368;
            border: 2px solid #4B1368;
        }
        .btn--outline:hover {
            background: #4B1368;
            color: #fff;
            transform: translateY(-3px);
        }
        .btn--whatsapp {
            background: #25D366;
            color: #fff;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
        }
        .btn--whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(37, 211, 102, 0.4);
        }
        .hero__stats {
            display: flex;
            gap: 40px;
        }
        .hero__stats div {
            font-weight: 500;
            color: #222;
        }
        .hero__stats span {
            font-weight: 800;
            font-size: 1.8rem;
            color: #6D28D9;
            display: block;
        }
        .hero__visual {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
        }
        .hero__card {
            padding: 30px 28px;
            text-align: center;
            width: 160px;
            animation: floatUp 1s ease forwards;
            opacity: 0;
        }
        .hero__card i {
            font-size: 2.8rem;
            color: #4B1368;
            margin-bottom: 10px;
        }
        .hero__card p {
            font-weight: 600;
            font-size: 1rem;
            color: #222;
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ========== SECTION HEADER ========== */
        .section__header {
            text-align: center;
            margin-bottom: 50px;
        }
        .section__tag {
            display: inline-block;
            background: rgba(109, 40, 217, 0.1);
            color: #6D28D9;
            padding: 4px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .section__title {
            font-size: 2.8rem;
            font-weight: 700;
            color: #4B1368;
        }
        .section__title span {
            color: #6D28D9;
        }
        .section__sub {
            color: #555;
            max-width: 600px;
            margin: 8px auto 0;
            font-size: 1.05rem;
        }

        /* ========== QUOTE FORM ========== */
        .quote {
            padding: 80px 0;
            background: #fafaff;
        }
        .quote__wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 40px 50px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.06);
        }
        .quote__form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 30px;
        }
        .form__group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form__group--full {
            grid-column: 1 / -1;
        }
        .form__group--half {
            grid-column: span 1;
        }
        .form__group--quarter {
            grid-column: span 1;
        }
        .form__row {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 20px;
        }
        .form__group label {
            font-weight: 500;
            font-size: 0.9rem;
            color: #222;
        }
        .form__group label span {
            color: #e74c3c;
        }
        .form__group input,
        .form__group select,
        .form__group textarea {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            font-family: inherit;
            transition: border 0.3s;
            background: #f9f9fc;
            width: 100%;
        }
        .form__group input:focus,
        .form__group select:focus,
        .form__group textarea:focus {
            outline: none;
            border-color: #6D28D9;
            box-shadow: 0 0 0 4px rgba(109, 40, 217, 0.1);
        }
        .form__group--map {
            grid-column: 1 / -1;
        }
        .quote__map {
            width: 100%;
            height: 240px;
            border-radius: 20px;
            background: #eef2f6;
        }
        .map__info {
            margin-top: 8px;
            font-weight: 500;
            color: #4B1368;
        }
        .btn--full {
            grid-column: 1 / -1;
            justify-content: center;
            padding: 16px;
        }
        .form__status {
            grid-column: 1 / -1;
            text-align: center;
            font-weight: 500;
            margin-top: 4px;
            padding: 10px;
            border-radius: 12px;
        }
        .form__status.success {
            color: #155724;
            background: #d4edda;
            border: 1px solid #c3e6cb;
        }
        .form__status.error {
            color: #721c24;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
        }
        .form__status.loading {
            color: #856404;
            background: #fff3cd;
            border: 1px solid #ffeeba;
        }

        /* ========== SERVICES ========== */
        .services {
            padding: 80px 0;
            background: #fff;
        }
        .services__grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
        }
        .service__card {
            padding: 30px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(75, 19, 104, 0.06);
            transition: all 0.3s;
        }
        .service__card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
        }
        .service__icon {
            font-size: 2.8rem;
            color: #6D28D9;
            margin-bottom: 14px;
        }
        .service__card h3 {
            font-size: 1.1rem;
            margin-bottom: 6px;
            color: #4B1368;
        }
        .service__card p {
            font-size: 0.9rem;
            color: #555;
        }

        /* ========== WHY CHOOSE ========== */
        .why {
            padding: 80px 0;
            background: #f8f4ff;
        }
        .why__grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }
        .why__item {
            text-align: center;
            padding: 20px;
        }
        .why__icon {
            font-size: 2.4rem;
            color: #6D28D9;
            margin-bottom: 12px;
        }
        .why__item h4 {
            font-size: 1.05rem;
            color: #4B1368;
        }
        .why__item p {
            font-size: 0.9rem;
            color: #555;
        }

        /* ========== GALLERY (UPDATED) ========== */
        .gallery {
            padding: 60px 0;
            background: #fdfdfd;
        }
        .gallery-filters {
            text-align: center;
            margin-bottom: 35px;
        }
        .filter-btn {
            padding: 10px 22px;
            margin: 5px;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid #ccc;
            background: #fff;
            color: #333;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }
        .filter-btn:hover {
            background: #f60;
            color: #fff;
            border-color: #f60;
        }
        .filter-btn.active {
            background: #f60;
            color: #fff;
            border-color: #f60;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .gallery__item {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .gallery__item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .gallery__img-thumb {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            cursor: pointer;
        }
        .gallery__caption {
            padding: 15px;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
            color: #333;
            background: #fff;
        }
        .gallery__lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .gallery__lightbox.open {
            display: flex;
        }
        .lightbox__close {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 2.8rem;
            color: #fff;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10000;
        }
        .lightbox__img {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        /* ========== REVIEWS ========== */
        .reviews {
            padding: 80px 0;
            background: #fafaff;
        }
        .reviews__counter {
            font-size: 1.8rem;
            font-weight: 700;
            color: #6D28D9;
            margin-top: 6px;
        }
        .reviews__counter span {
            font-size: 3.2rem;
            background: linear-gradient(135deg, #4B1368, #6D28D9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .reviews__grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .review__card {
            background: #fff;
            padding: 24px 22px;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(75, 19, 104, 0.04);
            transition: all 0.3s;
        }
        .review__card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
        }
        .review__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .review__name {
            font-weight: 600;
            color: #4B1368;
        }
        .review__location {
            font-size: 0.8rem;
            color: #777;
        }
        .review__stars {
            color: #FFD54F;
            letter-spacing: 2px;
            font-size: 1.1rem;
        }
        .review__text {
            font-size: 0.95rem;
            color: #333;
            margin-top: 6px;
            line-height: 1.5;
        }
        .btn--center {
            display: block;
            margin: 40px auto 0;
            text-align: center;
            width: fit-content;
            padding: 12px 40px;
        }

        /* ========== FAQ ========== */
        .faq {
            padding: 80px 0;
            background: #fff;
        }
        .faq__list {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .faq__item {
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
        }
        .faq__question {
            padding: 18px 24px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafaff;
            transition: background 0.3s;
            border: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .faq__question:hover {
            background: #f0ebf8;
        }
        .faq__question i {
            transition: transform 0.3s;
            color: #6D28D9;
        }
        .faq__question.active i {
            transform: rotate(180deg);
        }
        .faq__answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s;
            padding: 0 24px;
            color: #444;
        }
        .faq__answer.open {
            max-height: 300px;
            padding: 0 24px 20px;
        }

        /* ========== CONTACT ========== */
        .contact {
            padding: 80px 0;
            background: #f8f4ff;
        }
        .contact__wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }
        .contact__info {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .contact__item {
            display: flex;
            gap: 18px;
            align-items: flex-start;
        }
        .contact__icon {
            width: 48px;
            height: 48px;
            background: rgba(75, 19, 104, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #4B1368;
            flex-shrink: 0;
        }
        .contact__item h4 {
            font-weight: 600;
            color: #4B1368;
            margin-bottom: 2px;
        }
        .contact__item a {
            color: #6D28D9;
            font-weight: 500;
        }
        .contact__map-frame {
            width: 100%;
            height: 340px;
            border-radius: 30px;
            background: #eef2f6;
            overflow: hidden;
        }

        /* ========== FOOTER ========== */
        .footer {
            background: #1a0a2e;
            color: #ddd;
            padding: 50px 0 20px;
        }
        .footer__inner {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }
        .footer__brand .logo {
            color: #fff;
            margin-bottom: 12px;
        }
        .footer__brand .logo span {
            color: #FFD54F;
        }
        .footer__brand .logo .amp {
            color: #FFD54F;
        }
        .footer__brand p {
            font-size: 0.9rem;
            max-width: 300px;
            opacity: 0.8;
        }
        .footer__social {
            display: flex;
            gap: 14px;
            margin-top: 14px;
        }
        .footer__social a {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
            color: #fff;
        }
        .footer__social a:hover {
            background: #6D28D9;
            color: #fff;
        }
        .footer__links h4 {
            color: #fff;
            font-weight: 600;
            margin-bottom: 14px;
        }
        .footer__links ul li {
            margin-bottom: 8px;
        }
        .footer__links ul li a {
            opacity: 0.75;
            transition: opacity 0.3s;
        }
        .footer__links ul li a:hover {
            opacity: 1;
            color: #FFD54F;
        }
        .footer__bottom {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 24px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            opacity: 0.6;
        }

        /* ========== FLOATING ========== */
        .floating {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            z-index: 999;
        }
        .floating__btn {

            height: 60px;
